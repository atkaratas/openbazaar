version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: ob_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: openbazaar
    ports:
      - "5432:5432"
    volumes:
      - ob_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ob_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  ob_pgdata:
